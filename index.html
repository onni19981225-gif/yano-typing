<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小亞諾英文單字王</title>
    <style>
        :root {
            --primary: #3B7FB9; 
            --secondary: #B5EAD7;
            --accent: #FFDAC1; 
            --correct: #2ecc71;
            --wrong: #e74c3c;
            --text: #444;
            --key-base-width: 60px;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif;
            background-color: #EBF5FB;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.2s;
        }

        .menu-toggle {
            position: fixed; left: 20px; top: 20px; font-size: 30px; cursor: pointer;
            z-index: 2000; background: white; border: none;
            color: var(--primary); border-radius: 50%; width: 55px; height: 55px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #sidebar {
            width: 280px; height: 100vh; background-color: white;
            box-shadow: 4px 0 20px rgba(0,0,0,0.15);
            position: fixed; left: -350px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1500; display: flex; flex-direction: column;
        }
        #sidebar.open { left: 0; }
        
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            margin-top: 60px;
            border-bottom: 1px solid #EEE;
        }
        .home-icon-btn {
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
            border-radius: 10px;
            transition: 0.2s;
        }
        .home-icon-btn:hover { background: #F0F0F0; transform: scale(1.1); }

        .sidebar-content {
            flex-grow: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px; scrollbar-width: none;
        }
        .sidebar-content::-webkit-scrollbar { display: none; }

        .btn {
            width: 100%; background-color: var(--secondary); border: none; padding: 15px;
            border-radius: 15px; font-size: 1.1rem; cursor: pointer; font-weight: bold;
            color: #4A7C6E; box-shadow: 0 4px 0 #95CBB9; margin-bottom: 5px; flex-shrink: 0;
        }

        #main-view { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; width: 100%; }

        #home-logo { text-align: center; }
        .logo-icon { 
            font-size: 10rem; 
            margin-bottom: 20px; 
            display: block;
            filter: drop-shadow(0 10px 10px rgba(59,127,185,0.3));
            animation: swim 3s infinite ease-in-out;
        }
        .logo-text { 
            font-size: 4.5rem; 
            font-weight: 900; 
            color: #3B7FB9;
            text-shadow: 3px 3px 0px #FFDAC1, 6px 6px 0px rgba(0,0,0,0.05);
        }
        @keyframes swim {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        #top-info-bar { position: absolute; top: 30px; width: 80%; display: flex; justify-content: space-between; align-items: center; }
        #total-progress-container { width: 60%; height: 25px; background: #EEE; border-radius: 20px; overflow: hidden; border: 3px solid #DDD; display: none; }
        #total-progress-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s; }
        #timer-display { font-size: 2rem; font-weight: bold; color: #FF6B6B; display: none; }
        #counter-display { font-size: 2rem; font-weight: bold; color: #3B7FB9; display: none; }

        #word-area { text-align: center; width: 100%; display: none; }
        #word-display { font-size: 10vw; max-font-size: 100px; font-weight: bold; margin-bottom: 10px; letter-spacing: 6px; color: #ddd; }
        #translation-display { font-size: 2.2rem; color: #777; margin-bottom: 25px; font-weight: bold; height: 3rem; }

        .char-correct { color: var(--correct); }
        .char-wrong { color: var(--wrong); text-decoration: underline; background-color: rgba(231, 76, 60, 0.1); }

        #input-box { font-size: 2.5rem; padding: 12px 30px; border-radius: 60px; border: 6px solid var(--primary); outline: none; text-align: center; width: 85%; max-width: 450px; background: white; }

        #keyboard-area { display: none; text-align: center; width: 100%; max-width: 950px; }
        .keyboard { display: flex; flex-direction: column; gap: 8px; background: #EEE; padding: 25px; border-radius: 25px; }
        .kb-row { display: flex; gap: 10px; justify-content: center; }
        .key {
            width: var(--key-base-width); height: 60px; background: white; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold;
            border-bottom: 6px solid #ccc; position: relative;
        }
        .key.f-key::after, .key.j-key::after { content: ''; position: absolute; bottom: 12px; left: 50%; width: 22px; height: 4px; background: #ddd; transform: translateX(-50%); border-radius: 2px; }
        .key.highlight { background: #FF4D4D !important; color: white; border-color: #B30000; transform: translateY(2px); border-bottom-width: 2px; }

        #pre-game-start { text-align: center; background: white; padding: 40px; border-radius: 30px; border: 8px solid var(--accent); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 2500; }
        .modal-content { background: white; padding: 30px; border-radius: 35px; width: 85%; max-width: 380px; text-align: center; border: 10px solid var(--accent); }
        #result-layer { display: none; position: fixed; background: rgba(255,255,255,0.98); width: 100%; height: 100%; top:0; left:0; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; text-align: center; }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <div id="sidebar">
        <div class="sidebar-header">
            <span style="font-weight: bold; color: var(--primary);">🐳 冒險選單</span>
            <span class="home-icon-btn" onclick="location.reload()" title="回到首頁">🏠</span>
        </div>
        <div class="sidebar-content">
            <div style="color:#BBB; font-size:0.8rem;">找字母練習</div>
            <button class="btn" style="background: var(--accent);" onclick="prepareBeginnerMode()">⌨️ 初心者模式</button>
            <div style="color:#BBB; font-size:0.8rem;">單字 1000 字挑戰</div>
            <button class="btn" onclick="openRandomModal('easy')">🌱 簡單 (代名詞/動物/數字)</button>
            <button class="btn" onclick="openRandomModal('normal')">🌿 基礎 (食物/家居/學校)</button>
            <button class="btn" onclick="startRandomChallengeDirect('hard')">🌳 困難 (自然/交通/節慶)</button>
            <div style="color:#BBB; font-size:0.8rem;">個人化學習</div>
            <button class="btn" style="background: #E2F0CB;" onclick="showCustomModal()">✏️ 自訂單字庫</button>
        </div>
    </div>

    <div id="main-view">
        <div id="top-info-bar">
            <div id="total-progress-container"><div id="total-progress-bar"></div></div>
            <div id="timer-display">時間：--:--</div>
            <div id="counter-display">正確：0</div>
        </div>

        <div id="home-logo">
            <div class="logo-icon">🐋</div>
            <div class="logo-text">小亞諾英文單字王</div>
            <p style="color: #5D8AA8; font-size: 1.5rem; margin-top: 20px; font-weight: bold;">噴出水花！學完 1000 個單字吧！</p>
        </div>

        <div id="pre-game-start" style="display: none;">
            <h1 id="pre-title" style="color: var(--primary); font-size: 3rem;"></h1>
            <p id="pre-desc" style="font-size: 1.2rem; color: #888;"></p>
            <button class="btn" style="width: 200px; font-size: 1.5rem;" onclick="actualStartGame()">出發！</button>
        </div>

        <div id="word-area">
            <div id="word-display">READY?</div>
            <div id="translation-display"></div>
            <div style="display: flex; align-items: center; gap: 20px; justify-content: center;">
                <input type="text" id="input-box" placeholder="點我開始" autocomplete="off" inputmode="none">
                <span style="font-size: 3.5rem; cursor: pointer; user-select: none;" onclick="speakCurrent()">🔊</span>
            </div>
            <div id="progress-text" style="margin-top: 25px; font-weight: bold; font-size: 1.5rem; color: #888;"></div>
        </div>

        <div id="keyboard-area">
            <h1 id="kb-target" style="font-size: 6rem; color: #FF4D4D; margin-top: 0; margin-bottom: 20px;">?</h1>
            <div class="keyboard" id="virtual-keyboard"></div>
        </div>
    </div>

    <div id="random-modal" class="modal"><div class="modal-content"><h3 id="random-title"></h3><p>設定挑戰時間：<br><br><input type="number" id="random-minutes" value="1" min="1" max="10" style="width:70px; font-size:1.5rem; text-align:center;"> 分鐘</p><button class="btn" onclick="confirmRandomChallenge()">準備好了！</button><button class="btn" style="background:#eee; margin-top:10px;" onclick="hideRandomModal()">再等等</button></div></div>
    <div id="custom-modal" class="modal"><div class="modal-content"><h3>自訂單字清單</h3><textarea id="custom-input" style="width:100%; height:100px; padding:10px; border-radius:15px; border:2px solid #ddd;" placeholder="apple banana"></textarea><p>重複次數：<input type="number" id="custom-count" value="5" style="width:60px;"></p><button class="btn" onclick="startCustom()">開始</button><button class="btn" style="background:#eee; margin-top:10px;" onclick="hideModal()">關閉</button></div></div>
    <div id="result-layer"><h1 style="font-size:6rem; margin:0;">🏁</h1><h2 id="result-title"></h2><div id="result-detail" style="font-size:1.6rem; line-height:2; margin-bottom:30px;"></div><button class="btn" style="width:250px;" onclick="location.reload()">再玩一次</button></div>

            const kb = document.getElementById('virtual-keyboard'); kb.innerHTML = '';
            kbLayout.forEach(row => {
                const rowDiv = document.createElement('div'); rowDiv.className = 'kb-row';
                row.forEach(key => {
                    const kDiv = document.createElement('div'); kDiv.className = 'key' + (key === 'F' ? ' f-key' : '') + (key === 'J' ? ' j-key' : '');
                    kDiv.id = `key-${key}`; kDiv.innerText = key; rowDiv.appendChild(kDiv);
                });
                kb.appendChild(rowDiv);
            });
        }

        function nextChar() {
            document.querySelectorAll('.key').forEach(k => k.classList.remove('highlight'));
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            gameState.targetChar = chars[Math.floor(Math.random()*26)];
            document.getElementById('kb-target').innerText = gameState.targetChar;
            const targetEl = document.getElementById(`key-${gameState.targetChar}`);
            if(targetEl) targetEl.classList.add('highlight');
        }

        window.addEventListener('keydown', (e) => {
            if (!gameState.active) return;
            const isTyping = e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA';
            if (gameState.mode === 'beginner' && !isTyping) {
                if (e.key.toUpperCase() === gameState.targetChar) {
                    gameState.score++;
                    document.getElementById('counter-display').innerText = `得分：${gameState.score}`;
                    nextChar();
                } else if (!['SHIFT','CONTROL','ALT','CAPSLOCK','TAB','META','ENTER'].includes(e.key.toUpperCase())) {
                    playErrorSound();
                }
            }
        });

        const inputBox = document.getElementById('input-box');
        inputBox.addEventListener('keydown', (e) => {
            if (gameState.mode !== 'word' || !gameState.active) return;
            const word = gameState.currentList[gameState.currentIndex] || "";
            const currentIn = inputBox.value;
            if (e.key === 'Backspace' || e.key === 'Enter') return;
            let hasError = false;
            for (let i = 0; i < currentIn.length; i++) { if (currentIn[i].toLowerCase() !== word[i].toLowerCase()) { hasError = true; break; } }
            if (hasError) { e.preventDefault(); playErrorSound(); return; }
            const nextCharAttempt = e.key; const targetChar = word[currentIn.length];
            if (!targetChar || nextCharAttempt.toLowerCase() !== targetChar.toLowerCase()) { if (e.key.length === 1) { e.preventDefault(); playErrorSound(); } }
        });

        inputBox.addEventListener('input', () => { if(gameState.mode === 'word') renderWordWithColors(); });
        inputBox.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && gameState.mode === 'word' && gameState.active) {
                const target = gameState.currentList[gameState.currentIndex]?.toLowerCase();
                if (inputBox.value.trim().toLowerCase() === target) {
                    gameState.score++; gameState.currentIndex++; inputBox.value = "";
                    if (gameState.subMode === 'random') {
                        if (gameState.currentIndex >= gameState.currentList.length) { gameState.currentList = [...dict[gameState.currentDifficulty]].sort(()=>Math.random()-0.5); gameState.currentIndex = 0; }
                        document.getElementById('counter-display').innerText = `正確：${gameState.score}`;
                        renderWordWithColors(); speakCurrent();
                    } else {
                        if (gameState.currentIndex < gameState.currentList.length) { renderWordWithColors(); speakCurrent(); }
                        else endGame();
                    }
                } else playErrorSound();
            }
        });

        function confirmRandomChallenge() {
            const mins = parseInt(document.getElementById('random-minutes').value) || 1;
            hideRandomModal(); toggleSidebar(); clearUI();
            gameState.mode = 'word'; gameState.subMode = 'random';
            gameState.initialTime = mins; gameState.timeLeft = mins * 60;
            document.getElementById('pre-title').innerText = "🐳 限時大挑戰";
            document.getElementById('pre-desc').innerText = `設定：${mins} 分鐘，準備好噴出驚人的水花了嗎？`;
            document.getElementById('pre-game-start').style.display = 'block';
        }

        function startRandomChallengeDirect(diff) {
            gameState.currentDifficulty = diff; confirmRandomChallenge();
        }

        function startCustom() {
            const input = document.getElementById('custom-input').value; 
            const count = parseInt(document.getElementById('custom-count').value) || 1;
            const words = input.split(/[\s,]+/).filter(w=>w!==""); if(!words.length) return alert("請輸入單字");
            hideModal(); toggleSidebar(); clearUI();
            gameState.mode = 'word'; gameState.subMode = 'custom'; gameState.repeatCount = count; gameState.currentList = [];
            words.forEach(w => { for(let i=0; i<count; i++) gameState.currentList.push(w); });
            document.getElementById('pre-title').innerText = "自訂練習";
            document.getElementById('pre-desc').innerText = `總共練習 ${words.length} 個單字。`;
            document.getElementById('pre-game-start').style.display = 'block';
        }

        function clearUI() {
            gameState.active = false;
            document.getElementById('home-logo').style.display = 'none';
            document.getElementById('pre-game-start').style.display = 'none';
            document.getElementById('word-area').style.display = 'none';
            document.getElementById('keyboard-area').style.display = 'none';
            document.getElementById('timer-display').style.display = 'none';
            document.getElementById('counter-display').style.display = 'none';
            document.getElementById('total-progress-container').style.display = 'none';
            document.getElementById('progress-text').style.display = 'none';
            clearInterval(gameState.timer);
        }

        function actualStartGame() {
            document.getElementById('pre-game-start').style.display = 'none';
            gameState.active = true;
            if (gameState.mode === 'beginner') {
                document.getElementById('keyboard-area').style.display = 'block';
                document.getElementById('timer-display').style.display = 'block';
                document.getElementById('counter-display').style.display = 'block';
                initKeyboard(); nextChar(); startTimer();
            } else {
                document.getElementById('word-area').style.display = 'block';
                if (gameState.subMode === 'random') {
                    document.getElementById('timer-display').style.display = 'block';
                    document.getElementById('counter-display').style.display = 'block';
                    gameState.currentList = [...dict[gameState.currentDifficulty]].sort(()=>Math.random()-0.5);
                    startTimer();
                } else {
                    document.getElementById('total-progress-container').style.display = 'block';
                    document.getElementById('progress-text').style.display = 'block';
                }
                gameState.currentIndex = 0; gameState.score = 0;
                inputBox.value = ""; renderWordWithColors(); speakCurrent();
                setTimeout(() => inputBox.focus(), 300);
            }
        }

        function startTimer() {
            clearInterval(gameState.timer);
            gameState.timer = setInterval(() => {
                gameState.timeLeft--;
                const m = Math.floor(gameState.timeLeft / 60); const s = gameState.timeLeft % 60;
                document.getElementById('timer-display').innerText = `時間：${m}:${s.toString().padStart(2, '0')}`;
                if (gameState.timeLeft <= 0) endGame();
            }, 1000);
        }

        function renderWordWithColors() {
            const word = gameState.currentList[gameState.currentIndex] || "";
            const userIn = inputBox.value; let html = "";
            for (let i = 0; i < word.length; i++) {
                if (userIn[i] === undefined) html += `<span>${word[i]}</span>`;
                else if (userIn[i].toLowerCase() === word[i].toLowerCase()) html += `<span class="char-correct">${word[i]}</span>`;
                else html += `<span class="char-wrong">${word[i]}</span>`;
            }
            document.getElementById('word-display').innerHTML = html;
            document.getElementById('translation-display').innerText = dictionary[word.toLowerCase()] || "(自定義)";
            if (gameState.subMode === 'custom') {
                const total = gameState.currentList.length;
                document.getElementById('total-progress-bar').style.width = (gameState.currentIndex / total * 100) + "%";
                document.getElementById('progress-text').innerText = `練習進度：${(gameState.currentIndex % gameState.repeatCount) + 1} / ${gameState.repeatCount}`;
            }
        }

        function endGame() {
            gameState.active = false;
            clearInterval(gameState.timer);
            const detail = document.getElementById('result-detail');
            const layer = document.getElementById('result-layer');

            if (gameState.mode === 'beginner') {
                const highKey = "highscore_beginner";
                let high = localStorage.getItem(highKey) || 0;
                if(gameState.score > high) { localStorage.setItem(highKey, gameState.score); high = gameState.score; }
                detail.innerHTML = `抓到字母：<span style="color:var(--primary); font-size:2.5rem;">${gameState.score}</span> 個<br>最高紀錄：${high} 個`;
            } else if (gameState.subMode === 'random') {
                const highKey = `highscore_${gameState.currentDifficulty}`;
                let high = localStorage.getItem(highKey) || 0;
                if(gameState.score > high) { localStorage.setItem(highKey, gameState.score); high = gameState.score; }
                detail.innerHTML = `完成單字：${gameState.score} 個<br>最高紀錄：${high} 個`;
            } else {
                detail.innerHTML = `🎉 恭喜完成自訂練習！`;
            }
            layer.style.display = 'flex';
        }
    </script>
</body>
</html>
