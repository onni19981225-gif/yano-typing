<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小亞諾英文單字王 v3.1</title>
    <style>
        :root {
            --primary: #3B7FB9; 
            --secondary: #B5EAD7;
            --accent: #FFDAC1; 
            --correct: #2ecc71;
            --wrong: #e74c3c;
            --text: #444;
            --key-base-width: 60px;
            
            /* 指法顏色 */
            --finger-l4: #FFD1DC; --finger-l3: #FFECB3; --finger-l2: #C8E6C9; --finger-l1: #BBDEFB;
            --finger-r1: #D1C4E9; --finger-r2: #F8BBD0; --finger-r3: #DCEDC8; --finger-r4: #E0F2F1;

            /* 深色模式變數 */
            --bg: #EBF5FB; --card-bg: #ffffff; --card-border: #eeeeee; --input-bg: #ffffff;
            --text-main: #444; --text-muted: #888; --kb-bg: #dddddd; --kb-border: #bbbbbb;
            --key-bg: #ffffff; --sidebar-bg: #ffffff;
        }

        body.dark {
            --bg: #1a1e2e; --card-bg: #252a3a; --card-border: #333a50; --input-bg: #1e2332;
            --text-main: #e0e6f0; --text-muted: #8899aa; --kb-bg: #1a1e2e; --kb-border: #333a50;
            --key-bg: #2e3450; --sidebar-bg: #252a3a;
            background-color: var(--bg);
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg); margin: 0; display: flex; height: 100vh;
            overflow: hidden; transition: background-color 0.3s, color 0.3s; color: var(--text-main);
        }

        .menu-toggle {
            position: fixed; left: 20px; top: 20px; font-size: 30px; cursor: pointer;
            z-index: 2000; background: var(--card-bg); border: none;
            color: var(--primary); border-radius: 50%; width: 55px; height: 55px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        #dark-mode-toggle {
            position: fixed; right: 20px; top: 20px; font-size: 22px; cursor: pointer;
            z-index: 2000; background: var(--card-bg); border: none;
            border-radius: 50%; width: 50px; height: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: 0.3s;
        }
        #dark-mode-toggle:hover { transform: rotate(20deg) scale(1.1); }

        #sidebar {
            width: 280px; height: 100vh; background-color: var(--sidebar-bg);
            box-shadow: 4px 0 20px rgba(0,0,0,0.15); position: fixed; left: -350px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1500; display: flex; flex-direction: column;
        }
        #sidebar.open { left: 0; }
        
        .sidebar-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; margin-top: 60px; border-bottom: 1px solid var(--card-border); color: var(--primary);
        }
        .home-icon-btn { font-size: 1.5rem; cursor: pointer; padding: 5px; border-radius: 10px; transition: 0.2s; }
        .home-icon-btn:hover { background: var(--card-border); transform: scale(1.1); }

        .sidebar-content {
            flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px;
            scrollbar-width: thin; /* 平板上保留細微捲動提示 */
        }
        .sidebar-content::-webkit-scrollbar { width: 6px; }
        .sidebar-content::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

        .btn {
            width: 100%; background-color: var(--secondary); border: none; padding: 15px;
            border-radius: 15px; font-size: 1.1rem; cursor: pointer; font-weight: bold;
            color: #4A7C6E; box-shadow: 0 4px 0 #95CBB9; margin-bottom: 5px; flex-shrink: 0;
            transition: transform 0.1s, box-shadow 0.1s; font-family: inherit;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #95CBB9; }

        #main-view { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; width: 100%; }

        #home-logo { text-align: center; }
        .logo-icon { font-size: 10rem; margin-bottom: 20px; display: block; animation: swim 3s infinite ease-in-out; }
        .logo-text { font-size: 4.5rem; font-weight: 900; color: #3B7FB9; text-shadow: 3px 3px 0px #FFDAC1; }
        @keyframes swim { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(5deg); } }

        #top-info-bar { position: absolute; top: 30px; width: 80%; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        #total-progress-container { width: 60%; height: 25px; background: var(--card-border); border-radius: 20px; overflow: hidden; border: 3px solid var(--card-border); display: none; }
        #total-progress-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s; }
        #timer-display { font-size: 2rem; font-weight: bold; color: #FF6B6B; display: none; }
        #counter-display { font-size: 2rem; font-weight: bold; color: #3B7FB9; display: none; }

        #word-area { text-align: center; width: 100%; display: none; }
        #word-display { font-size: 8vw; font-weight: bold; margin-bottom: 10px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .char-box { display: inline-block; min-width: 0.8em; border-bottom: 6px solid var(--card-border); text-align: center; line-height: 1.1; }
        .char-box.space { border-bottom: none; min-width: 0.4em; }
        #translation-display { font-size: 2.2rem; color: var(--text-muted); margin-bottom: 25px; font-weight: bold; height: 3rem; }

        .char-correct { color: var(--correct); }
        .char-wrong { color: var(--wrong) !important; }
        .shake-kb, .shake-error { animation: shake 0.3s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }

        #input-box { font-size: 2.5rem; padding: 12px 30px; border-radius: 60px; border: 6px solid var(--primary); outline: none; text-align: center; width: 85%; max-width: 450px; background: var(--input-bg); color: var(--text-main); font-family: inherit; }

        #keyboard-area { display: none; text-align: center; width: 100%; max-width: 1000px; }
        .keyboard { display: flex; flex-direction: column; gap: 8px; background: var(--kb-bg); padding: 15px; border-radius: 20px; border: 4px solid var(--kb-border); }
        .kb-row { display: flex; gap: 6px; justify-content: center; }
        .key { width: 55px; height: 55px; background: var(--key-bg); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: bold; border-bottom: 5px solid #aaa; position: relative; color: var(--text-main); }
        .key.f-key::after, .key.j-key::after { content: ''; position: absolute; bottom: 10px; left: 50%; width: 18px; height: 3px; background: #999; transform: translateX(-50%); border-radius: 2px; }
        .key.highlight { background: #FF4D4D !important; color: white !important; border-color: #B30000; transform: scale(1.2); z-index: 10; box-shadow: 0 0 15px rgba(255, 77, 77, 0.5); }

        #pre-game-start { text-align: center; background: var(--card-bg); padding: 40px; border-radius: 30px; border: 8px solid var(--accent); display: none; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 2500; }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 35px; width: 85%; max-width: 480px; text-align: center; border: 10px solid var(--accent); color: var(--text-main); }
        #result-layer { display: none; position: fixed; background: var(--bg); width: 100%; height: 100%; top:0; left:0; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; }
        
        .pop-anim { animation: pop-correct 0.25s ease-out; }
        @keyframes pop-correct { 0% { transform: scale(1); } 40% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <button id="dark-mode-toggle" onclick="toggleDark()">🌙</button>

    <div id="sidebar">
        <div class="sidebar-header">
            <span style="font-weight: bold;">🐳 冒險選單</span>
            <span class="home-icon-btn" onclick="location.reload()">🏠</span>
        </div>
        <div class="sidebar-content">
            <div id="sound-toggle-wrap">
                <span>🔈 答對音效</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="sound-toggle" checked onchange="toggleSound()">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div style="color:#BBB; font-size:0.8rem;">找字母練習</div>
            <button class="btn" style="background: var(--accent);" onclick="prepareBeginnerMode()">⌨️ 初心者模式</button>
            <div style="color:#BBB; font-size:0.8rem;">單字挑戰</div>
            <button class="btn" onclick="openRandomModal('easy')">🌱 簡單模式</button>
            <button class="btn" onclick="openRandomModal('normal')">🌿 基礎模式</button>
            <button class="btn" onclick="openRandomModal('hard')">🌳 困難模式</button>
            <div style="color:#BBB; font-size:0.8rem;">個人化學習</div>
            <button class="btn" style="background: #E2F0CB;" onclick="showCustomModal()">✏️ 自訂單字庫</button>
            <button class="btn" style="background: #FFE8E8; color:#c0392b;" onclick="showReviewModal()">📌 待複習清單 <span id="review-badge"></span></button>
        </div>
    </div>

    <div id="main-view">
        <div id="top-info-bar">
            <div id="total-progress-container"><div id="total-progress-bar"></div></div>
            <div id="timer-display">時間：--:--</div>
            <div id="counter-display">正確：0</div>
        </div>

        <div id="home-logo">
            <div class="logo-icon">🐋</div>
            <div class="logo-text">小亞諾英文單字王</div>
            <p style="color: #5D8AA8; font-size: 1.5rem; font-weight: bold;">點擊左上角 ☰ 開始練習吧！</p>
        </div>

        <div id="pre-game-start">
            <h1 id="pre-title" style="color: var(--primary);"></h1>
            <p id="pre-desc"></p>
            <button class="btn" style="width: 200px; font-size: 1.5rem;" onclick="actualStartGame()">出發！</button>
        </div>

        <div id="word-area">
            <div id="word-display">READY?</div>
            <div id="translation-display"></div>
            <div style="display: flex; align-items: center; gap: 20px; justify-content: center;">
                <input type="text" id="input-box" placeholder="點我開始" autocomplete="off" inputmode="none">
                <span style="font-size: 3.5rem; cursor: pointer;" onclick="speakCurrent()">🔊</span>
            </div>
            <div id="progress-text" style="margin-top: 25px; font-weight: bold;"></div>
        </div>

        <div id="keyboard-area">
            <h1 id="kb-target" style="font-size: 6rem; color: #FF4D4D;">?</h1>
            <div class="keyboard" id="virtual-keyboard"></div>
        </div>
    </div>

    <div id="result-layer">
        <h1 style="font-size:6rem; margin:0;">🏁</h1>
        <h2 id="result-title" style="color: var(--primary);">挑戰結束！</h2>
        <div id="result-detail" style="font-size:1.6rem; font-weight: bold;"></div>
        <div id="exam-results-box" style="display:none;"></div>
        <div style="display:flex; gap:15px; flex-wrap: wrap; justify-content: center; margin-top:20px;">
            <button class="btn" style="width:180px;" onclick="actualStartGame()">再挑戰一次</button>
            <button class="btn" style="width:180px; background:#ddd;" onclick="location.reload()">回到主畫面</button>
        </div>
    </div>

    <div id="random-modal" class="modal"><div class="modal-content">
        <h3 id="random-title">模式</h3>
        <p>設定時間 (分鐘)：<br><input type="number" id="random-minutes" value="1" min="1" style="font-size:1.5rem; width:80px;"></p>
        <button class="btn" onclick="confirmRandomChallenge()">準備好了！</button>
        <button class="btn" style="background:#eee;" onclick="hideRandomModal()">關閉</button>
    </div></div>

    <script>
        // ── 基礎資料 ──
        const dictionary = { "apple":"蘋果", "banana":"香蕉", "cat":"貓", "dog":"狗" /* ... 其餘 1000+ 單字 ... */ };
        const dict = { easy: ["i", "he", "she"], normal: ["time", "water"], hard: ["experience", "different"] };
        const kbRows = [ ["Q","W","E","R","T","Y","U","I","O","P"], ["A","S","D","F","G","H","J","K","L"], ["Z","X","C","V","B","N","M"] ];
        const fingerMap = { "Q":"l4","A":"l4","Z":"l4","W":"l3","S":"l3","X":"l3","E":"l2","D":"l2","C":"l2","R":"l1","F":"l1","V":"l1","T":"l1","G":"l1","B":"l1","Y":"r1","H":"r1","N":"r1","U":"r1","J":"r1","M":"r1","I":"r2","K":"r2","O":"r3","L":"r3","P":"r4" };

        let gameState = { 
            mode: '', subMode: '', currentDifficulty: '', currentList: [], 
            currentIndex: 0, score: 0, timeLeft: 0, timer: null, active: false 
        };
        let lastChar = ''; let isCoolingDown = false; let soundEnabled = true; let darkMode = false;

        // ── 初始化 ──
        window.onload = () => {
            if (localStorage.getItem('dark_mode') === 'true') toggleDark();
            updateReviewBadge();
        };

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function toggleDark() { 
            darkMode = !darkMode; document.body.classList.toggle('dark', darkMode);
            document.getElementById('dark-mode-toggle').textContent = darkMode ? '☀️' : '🌙';
            localStorage.setItem('dark_mode', darkMode);
        }

        // ── 核心遊戲流程 ──
        function actualStartGame() {
            // 1. 徹底清理舊狀態
            if (gameState.timer) clearInterval(gameState.timer);
            gameState.timer = null;
            gameState.active = true;
            gameState.score = 0;
            gameState.currentIndex = 0;

            // 2. 隱藏所有非相關 UI
            document.getElementById('home-logo').style.display = 'none';
            document.getElementById('pre-game-start').style.display = 'none';
            document.getElementById('result-layer').style.display = 'none';
            document.getElementById('word-area').style.display = 'none';
            document.getElementById('keyboard-area').style.display = 'none';

            // 3. 根據模式初始化時間與畫面
            if (gameState.mode === 'beginner') {
                gameState.timeLeft = 60;
                document.getElementById('keyboard-area').style.display = 'block';
                document.getElementById('timer-display').style.display = 'block';
                document.getElementById('counter-display').style.display = 'block';
                document.getElementById('counter-display').innerText = "得分：0";
                initKeyboard(); nextChar(); startTimer();
            } else {
                document.getElementById('word-area').style.display = 'block';
                document.getElementById('input-box').value = "";
                if (gameState.subMode === 'random') {
                    const mins = parseInt(document.getElementById('random-minutes').value) || 1;
                    gameState.timeLeft = mins * 60;
                    document.getElementById('timer-display').style.display = 'block';
                    document.getElementById('counter-display').style.display = 'block';
                    document.getElementById('counter-display').innerText = "正確：0";
                    gameState.currentList = [...(dict[gameState.currentDifficulty] || [])].sort(() => Math.random()-0.5);
                    startTimer();
                } else {
                    document.getElementById('total-progress-container').style.display = 'block';
                    document.getElementById('progress-text').style.display = 'block';
                }
                renderWord();
                setTimeout(() => document.getElementById('input-box').focus(), 300);
            }
            updateTimerDisplay();
        }

        function startTimer() {
            if (gameState.timer) clearInterval(gameState.timer);
            gameState.timer = setInterval(() => {
                gameState.timeLeft--;
                updateTimerDisplay();
                if (gameState.timeLeft <= 0) endGame();
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(gameState.timeLeft / 60);
            const s = gameState.timeLeft % 60;
            document.getElementById('timer-display').innerText = `時間：${m}:${s.toString().padStart(2, '0')}`;
        }

        function endGame() {
            gameState.active = false;
            if (gameState.timer) clearInterval(gameState.timer);
            gameState.timer = null;
            
            document.getElementById('word-area').style.display = 'none';
            document.getElementById('keyboard-area').style.display = 'none';
            document.getElementById('timer-display').style.display = 'none';
            document.getElementById('counter-display').style.display = 'none';
            
            document.getElementById('result-detail').innerText = `總得分：${gameState.score}`;
            document.getElementById('result-layer').style.display = 'flex';
        }

        // ── 其餘輔助函式 (同前) ──
        function initKeyboard() {
            const kb = document.getElementById('virtual-keyboard');
            kb.innerHTML = '';
            kbRows.forEach(row => {
                const rowDiv = document.createElement('div'); rowDiv.className = 'kb-row';
                row.forEach(key => {
                    const kDiv = document.createElement('div');
                    kDiv.className = 'key' + (key==='F'?' f-key':'') + (key==='J'?' j-key':'');
                    kDiv.id = `key-${key}`; kDiv.innerText = key;
                    const finger = fingerMap[key];
                    if (finger) kDiv.style.backgroundColor = `var(--finger-${finger})`;
                    rowDiv.appendChild(kDiv);
                });
                kb.appendChild(rowDiv);
            });
        }

        function nextChar() {
            document.querySelectorAll('.key').forEach(k => k.classList.remove('highlight'));
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let newChar;
            do { newChar = chars[Math.floor(Math.random()*26)]; } while (newChar === lastChar);
            lastChar = newChar;
            gameState.targetChar = newChar;
            document.getElementById('kb-target').innerText = newChar;
            const targetEl = document.getElementById(`key-${newChar}`);
            if (targetEl) targetEl.classList.add('highlight');
        }

        function renderWord() {
            const word = gameState.currentList[gameState.currentIndex] || "";
            const userIn = document.getElementById('input-box').value;
            let html = "";
            for (let i=0; i<word.length; i++) {
                const char = word[i];
                const userInputChar = userIn[i];
                if (char === ' ') {
                    html += `<div class="char-box space">&nbsp;</div>`;
                } else {
                    let className = "";
                    if (userInputChar !== undefined) className = (userInputChar === char) ? "char-correct" : "char-wrong";
                    html += `<div class="char-box"><span class="${className}">${userInputChar || (gameState.testMode ? "&nbsp;" : char)}</span></div>`;
                }
            }
            document.getElementById('word-display').innerHTML = html;
        }

        // 其餘邏輯... (如 speakCurrent, openRandomModal 等)
    </script>
</body>
</html>
